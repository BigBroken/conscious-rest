<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" rx="40" fill="#5a7a64"/>

  <!-- Stylized spine/wave representing Alexander Technique primary control -->
  <path d="M 200 80 Q 160 140 200 200 Q 240 260 200 320"
        stroke="#f5f0e8" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Head circle at top of spine -->
  <circle cx="200" cy="72" r="20" fill="#f5f0e8"/>

  <!-- Horizontal lines representing the surface/rest -->
  <line x1="120" y1="340" x2="280" y2="340" stroke="#f5f0e8" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="355" x2="300" y2="355" stroke="#f5f0e8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- CR initials -->
  <text x="200" y="398" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#f5f0e8" letter-spacing="8" opacity="0.7">CONSCIOUS REST</text>
</svg>
